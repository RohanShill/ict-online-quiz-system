<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Online Test</title>
</head>

<body>
    <h1>ICT Online Test</h1>
    <div id="stuBox">

        <form action="" id="form">
            <div>
                <label for="name">Student Name:</label>
                <input required type="text"  id="name" placeholder="Student Name">
            </div>
            <div>
                <label for="rollNo">Roll no:</label>
                <input required type="number" placeholder="Roll Nuber" id="rollNo">

            </div>
            <div>
                <label for="class">Class:</label>
                <select required name="" id="class">
                    <option value="6">Class 6</option>
                    <option value="7">Class 7</option>
                    <option value="8">Class 8</option>
                </select>
            </div>
            <button type="submit" id="btn">Submit</button>
        </form>
    </div>
</body>

</html>
